metric_id: expert

# ── LLM судья (через OpenRouter) ─────────────────────────────────────────────
judge_model:       qwen/qwen3-32b
judge_base_url:    https://openrouter.ai/api/v1
judge_api_key_env: OPENROUTER_API_KEY
judge_provider:    alibaba          # опционально — явно указать провайдера на OpenRouter
judge_disable_reasoning: true  # отключить reasoning/thinking токены (для моделей типа Qwen3, DeepSeek-R1)
judge_id:          qwen3
judge_comment:     run1

# ── Параметры ─────────────────────────────────────────────────────────────────
max_retries:       3
# Параллельные claims (каждый — 1 LLM вызов с C.1–C.4)
judge_workers:     10

resume: true
