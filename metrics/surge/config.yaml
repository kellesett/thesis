evaluator_id: surge
eval_list: [rouge_bleu, sh_recall, structure_quality, logic, citation_count, corpus_match_rate, coverage, reference_self_cited]
# Original SurGE subset currently wired here:
#   rouge_bleu, sh_recall, structure_quality, coverage, logic
# Plus local citation diagnostics:
#   citation_count, corpus_match_rate, reference_self_cited

# LLM судья
judge_model: google/gemma-4-31b-it
judge_id: gemma-4-31b                  # короткое имя для имени папки со скорами
judge_base_url: https://openrouter.ai/api/v1
judge_api_key_env: OPENROUTER_API_KEY
judge_comment: run1                    # свободный комментарий, входит в имя папки со скорами

# Embedding-модель для SH-Recall (игнорируется если sh_recall не в eval_list)
embedding_model: BAAI/bge-large-en-v1.5

resume: true                           # пропускать уже оценённые генерации
