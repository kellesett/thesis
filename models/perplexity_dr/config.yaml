model_id: perplexity_dr                        # используется в пути results/generations/<dataset_id>_<model_id>/
model: perplexity/sonar-deep-research
api_key_env: OPENROUTER_API_KEY
base_url: https://openrouter.ai/api/v1
resume: true                                   # пропускать уже сгенерированные
# Сколько обзоров обсчитывать — флагом `--limit N` (id-based, ≤ N).
# Через make: `make generate ... LIMIT=10`. Без флага — все.

# Фильтр доменов для поиска Perplexity (передаётся через extra_body)
# Оставить пустым [] чтобы не ограничивать домены
search_domain_filter:
  - arxiv.org
  - semanticscholar.org
